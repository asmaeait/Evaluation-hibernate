# Configuration de la base de donnťes (MySQL)
hibernate.connection.driver_class=com.mysql.cj.jdbc.Driver
hibernate.connection.url=jdbc:mysql://localhost:3306/gestion-projets?createDatabaseIfNotExist=true
hibernate.connection.username=root
hibernate.connection.password=

# Dialecte Hibernate pour MySQL 8+
hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Afficher les requÍtes SQL dans la console (Utile pour le dťbogage)
hibernate.show_sql=true
hibernate.format_sql=true

# Stratťgie de crťation des tables
# update : crťe les tables si elles n'existent pas ou les met ŗ jour
hibernate.hbm2ddl.auto=update

# Gestion du pool de connexions (optionnel mais recommandť)
hibernate.connection.pool_size=10

# Configuration du contexte de session
hibernate.current_session_context_class=thread